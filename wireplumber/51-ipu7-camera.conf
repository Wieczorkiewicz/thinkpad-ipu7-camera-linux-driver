monitor.v4l2.rules = [
  {
    # video98: 1080p compatibility device — make it look like a real UVC camera.
    matches = [
      {
        api.v4l2.cap.card = "Front Camera"
      }
    ]
    actions = {
      update-props = {
        api.v4l2.cap.driver   = "uvcvideo"
        node.description      = "Front Camera"
        node.nick             = "Front Camera"
      }
    }
  }
  {
    # video99: 4K device — make it look like a real UVC camera.
    matches = [
      {
        api.v4l2.cap.card = "Front Camera 4K"
      }
    ]
    actions = {
      update-props = {
        api.v4l2.cap.driver   = "uvcvideo"
        node.description      = "Front Camera 4K"
        node.nick             = "Front Camera 4K"
      }
    }
  }
  {
    # Hide raw IPU7 sub-nodes (video0–video31, driver=isys).
    # They cannot stream without the HAL and only create clutter.
    # V4L2 direct access (Brave, Signal, etc.) is unaffected.
    matches = [
      {
        api.v4l2.cap.driver = "isys"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
