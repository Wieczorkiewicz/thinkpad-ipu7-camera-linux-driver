monitor.v4l2.rules = [
  {
    # Make the v4l2loopback virtual camera look like a real UVC device.
    # Firefox/Zen filter out nodes where api.v4l2.cap.driver = "v4l2 loopback".
    matches = [
      {
        api.v4l2.cap.card = "IPU7 Camera"
      }
    ]
    actions = {
      update-props = {
        api.v4l2.cap.driver   = "uvcvideo"
        node.description      = "Front Camera"
        node.nick             = "Front Camera"
      }
    }
  }
  {
    # Hide raw IPU7 sub-nodes (video0–video31, driver=isys).
    # They cannot stream without the HAL and only create clutter.
    # V4L2 direct access (Brave, Signal, etc.) is unaffected.
    matches = [
      {
        api.v4l2.cap.driver = "isys"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
